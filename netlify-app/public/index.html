<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Alpha Agent — Stock Analyzer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Bebas+Neue&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #080c10; --surface: #0d1117; --border: #1e2630; --border2: #2a3540;
  --text: #e8edf3; --muted: #64748b; --accent: #00ff88; --accent2: #00ccff;
  --buy: #00c853; --hold: #f59e0b; --sell: #ef4444;
  --mono: 'DM Mono', monospace; --sans: 'Inter', sans-serif; --display: 'Bebas Neue', sans-serif;
}
body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; padding: 2rem 1rem; }
.wrap { max-width: 720px; margin: 0 auto; }

/* HEADER */
header { text-align: center; margin-bottom: 2.5rem; }
header .eyebrow { font-family: var(--mono); font-size: 0.65rem; letter-spacing: 0.3em; color: var(--muted); text-transform: uppercase; margin-bottom: 0.5rem; }
header h1 { font-family: var(--display); font-size: clamp(2.5rem, 8vw, 4rem); letter-spacing: 0.08em; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1; }
header .sub { font-size: 0.75rem; font-family: var(--mono); color: var(--muted); margin-top: 0.4rem; letter-spacing: 0.1em; }

/* CARD */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.25rem; }

/* SEARCH */
.search-row { display: flex; gap: 0.75rem; position: relative; }
.ticker-wrap { position: relative; flex: 1; }
.ticker-prefix { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); font-family: var(--mono); font-weight: 500; color: var(--accent); font-size: 1rem; z-index: 1; }
#ticker-input { width: 100%; background: #060a0e; border: 1px solid var(--border); border-radius: 8px; padding: 0.85rem 1rem 0.85rem 2rem; color: var(--accent); font-family: var(--mono); font-size: 1rem; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; outline: none; transition: border-color 0.2s; }
#ticker-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,255,136,0.08); }
#ticker-input::placeholder { color: var(--muted); letter-spacing: 0.05em; text-transform: none; font-size: 0.85rem; font-weight: 400; }
#analyze-btn { background: var(--accent); color: #000; font-family: var(--mono); font-weight: 500; font-size: 0.8rem; letter-spacing: 0.1em; padding: 0 1.5rem; border: none; border-radius: 8px; cursor: pointer; white-space: nowrap; transition: opacity 0.2s; }
#analyze-btn:hover { opacity: 0.85; }
#analyze-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* AUTOCOMPLETE */
.autocomplete-list { position: absolute; top: calc(100% + 4px); left: 0; right: 0; background: #0d1117; border: 1px solid var(--border2); border-radius: 8px; z-index: 100; overflow: hidden; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
.autocomplete-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.6rem 1rem; cursor: pointer; transition: background 0.1s; }
.autocomplete-item:hover { background: #131a23; }
.ac-ticker { font-family: var(--mono); font-size: 0.8rem; font-weight: 500; color: var(--accent); min-width: 3.5rem; }
.ac-name { font-size: 0.78rem; color: var(--muted); }

/* RESULT */
#result { display: none; }
.result-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 1.25rem; gap: 1rem; flex-wrap: wrap; }
.result-name { font-size: 0.7rem; font-family: var(--mono); color: var(--muted); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 0.2rem; }
.result-ticker { font-family: var(--display); font-size: 2rem; letter-spacing: 0.08em; color: var(--text); }
.result-price { text-align: right; }
.result-price .price { font-family: var(--mono); font-size: 1.8rem; font-weight: 500; color: var(--text); }
.result-price .change { font-family: var(--mono); font-size: 0.75rem; margin-top: 0.1rem; }
.pos { color: var(--buy); } .neg { color: var(--sell); }

.signal-badge { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.4rem 1rem; border-radius: 6px; font-family: var(--mono); font-size: 0.8rem; font-weight: 500; letter-spacing: 0.1em; }
.signal-badge.buy { background: rgba(0,200,83,0.15); color: var(--buy); border: 1px solid rgba(0,200,83,0.3); }
.signal-badge.hold { background: rgba(245,158,11,0.12); color: var(--hold); border: 1px solid rgba(245,158,11,0.25); }
.signal-badge.sell { background: rgba(239,68,68,0.12); color: var(--sell); border: 1px solid rgba(239,68,68,0.25); }
.signal-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }

.metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 0.75rem; margin: 1rem 0; }
.metric { background: #060a0e; border: 1px solid var(--border); border-radius: 8px; padding: 0.75rem 1rem; }
.metric-label { font-size: 0.6rem; font-family: var(--mono); color: var(--muted); letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 0.3rem; }
.metric-value { font-family: var(--mono); font-size: 0.95rem; font-weight: 500; color: var(--text); }

.analysis-text { font-size: 0.82rem; line-height: 1.7; color: #94a3b8; border-top: 1px solid var(--border); padding-top: 1rem; margin-top: 1rem; }
.analysis-text p { margin-bottom: 0.5rem; }

/* LOADING */
#loading { display: none; text-align: center; padding: 2rem; }
.spinner { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 0.75rem; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-label { font-family: var(--mono); font-size: 0.7rem; color: var(--muted); letter-spacing: 0.15em; }

/* ERROR */
#error-msg { display: none; font-family: var(--mono); font-size: 0.8rem; color: var(--sell); padding: 0.75rem 1rem; background: rgba(239,68,68,0.07); border: 1px solid rgba(239,68,68,0.2); border-radius: 8px; margin-top: 0.75rem; }

/* ── HISTORY ── */
#history-section { margin-bottom: 1.25rem; }
.history-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.75rem; }
.history-header h2 { font-family: var(--mono); font-size: 0.7rem; letter-spacing: 0.25em; color: var(--muted); text-transform: uppercase; }
#clear-history-btn { font-family: var(--mono); font-size: 0.65rem; color: var(--muted); background: none; border: 1px solid var(--border); border-radius: 4px; padding: 0.2rem 0.6rem; cursor: pointer; letter-spacing: 0.1em; transition: color 0.15s, border-color 0.15s; }
#clear-history-btn:hover { color: var(--sell); border-color: var(--sell); }
#history-empty { font-family: var(--mono); font-size: 0.75rem; color: var(--muted); text-align: center; padding: 1.5rem; }

.history-table { width: 100%; border-collapse: collapse; }
.history-table th { font-family: var(--mono); font-size: 0.6rem; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase; text-align: left; padding: 0.4rem 0.75rem; border-bottom: 1px solid var(--border); }
.history-table th:last-child, .history-table td:last-child { text-align: right; }
.history-table td { padding: 0.55rem 0.75rem; font-size: 0.8rem; border-bottom: 1px solid rgba(30,38,48,0.6); vertical-align: middle; }
.history-table tr:last-child td { border-bottom: none; }
.history-table tr { cursor: pointer; transition: background 0.1s; }
.history-table tr:hover td { background: rgba(255,255,255,0.02); }
.h-ticker { font-family: var(--mono); font-weight: 500; color: var(--accent); font-size: 0.82rem; }
.h-name { color: var(--muted); font-size: 0.75rem; max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.h-price { font-family: var(--mono); font-size: 0.82rem; color: var(--text); }
.h-date { font-family: var(--mono); font-size: 0.7rem; color: var(--muted); }
.h-signal { }
.h-signal .sb { font-family: var(--mono); font-size: 0.65rem; font-weight: 500; padding: 0.15rem 0.5rem; border-radius: 4px; letter-spacing: 0.08em; }
.h-signal .sb.buy { background: rgba(0,200,83,0.15); color: var(--buy); }
.h-signal .sb.hold { background: rgba(245,158,11,0.12); color: var(--hold); }
.h-signal .sb.sell { background: rgba(239,68,68,0.12); color: var(--sell); }

.footer { text-align: center; margin-top: 2rem; font-family: var(--mono); font-size: 0.6rem; color: #2a3540; letter-spacing: 0.15em; }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="eyebrow">AI-Powered Analysis</div>
    <h1>ALPHA AGENT</h1>
    <div class="sub">Real-time stock intelligence · Powered by Claude</div>
  </header>

  <!-- SEARCH -->
  <div class="card">
    <div class="search-row">
      <div class="ticker-wrap">
        <span class="ticker-prefix">$</span>
        <input id="ticker-input" type="text" placeholder="Type ticker or company name…" autocomplete="off" spellcheck="false">
        <div id="autocomplete-list" class="autocomplete-list" style="display:none"></div>
      </div>
      <button id="analyze-btn">ANALYZE</button>
    </div>
    <div id="error-msg"></div>
  </div>

  <!-- LOADING -->
  <div id="loading" class="card">
    <div class="spinner"></div>
    <div class="loading-label">FETCHING MARKET DATA…</div>
  </div>

  <!-- RESULT -->
  <div id="result" class="card">
    <div class="result-header">
      <div>
        <div class="result-name" id="r-name"></div>
        <div class="result-ticker" id="r-ticker"></div>
        <div style="margin-top:0.5rem" id="r-signal"></div>
      </div>
      <div class="result-price">
        <div class="price" id="r-price"></div>
        <div class="change" id="r-change"></div>
      </div>
    </div>
    <div class="metrics-grid" id="r-metrics"></div>
    <div class="analysis-text" id="r-analysis"></div>
  </div>

  <!-- HISTORY -->
  <div id="history-section" class="card" style="display:none">
    <div class="history-header">
      <h2>Recent Searches</h2>
      <button id="clear-history-btn">CLEAR ALL</button>
    </div>
    <div id="history-body">
      <div id="history-empty">No searches yet. Analyze a stock to get started.</div>
      <table class="history-table" id="history-table" style="display:none">
        <thead>
          <tr>
            <th>Ticker</th>
            <th>Company</th>
            <th>Signal</th>
            <th>Price at Search</th>
            <th>Date &amp; Time</th>
          </tr>
        </thead>
        <tbody id="history-rows"></tbody>
      </table>
    </div>
  </div>

  <div class="footer">ALPHA AGENT · FOR INFORMATIONAL PURPOSES ONLY · NOT FINANCIAL ADVICE</div>
</div>

<script>
// ── STOCK SYMBOL AUTOCOMPLETE LIST ──────────────────────────────────────────
const SYMBOLS = [
  {s:'AAPL',n:'Apple Inc.'},      {s:'MSFT',n:'Microsoft Corp.'},
  {s:'GOOGL',n:'Alphabet Inc.'},  {s:'AMZN',n:'Amazon.com Inc.'},
  {s:'NVDA',n:'NVIDIA Corp.'},    {s:'META',n:'Meta Platforms'},
  {s:'TSLA',n:'Tesla Inc.'},      {s:'BRK.B',n:'Berkshire Hathaway'},
  {s:'JPM',n:'JPMorgan Chase'},   {s:'V',n:'Visa Inc.'},
  {s:'MA',n:'Mastercard'},        {s:'UNH',n:'UnitedHealth Group'},
  {s:'JNJ',n:'Johnson & Johnson'},{s:'XOM',n:'Exxon Mobil'},
  {s:'PG',n:'Procter & Gamble'},  {s:'HD',n:'Home Depot'},
  {s:'CVX',n:'Chevron Corp.'},    {s:'MRK',n:'Merck & Co.'},
  {s:'ABBV',n:'AbbVie Inc.'},     {s:'LLY',n:'Eli Lilly'},
  {s:'BAC',n:'Bank of America'},  {s:'PFE',n:'Pfizer Inc.'},
  {s:'KO',n:'Coca-Cola Co.'},     {s:'AVGO',n:'Broadcom Inc.'},
  {s:'PEP',n:'PepsiCo Inc.'},     {s:'COST',n:'Costco Wholesale'},
  {s:'TMO',n:'Thermo Fisher'},    {s:'MCD',n:'McDonald\'s Corp.'},
  {s:'WMT',n:'Walmart Inc.'},     {s:'DIS',n:'Walt Disney Co.'},
  {s:'NFLX',n:'Netflix Inc.'},    {s:'AMD',n:'Advanced Micro Devices'},
  {s:'INTC',n:'Intel Corp.'},     {s:'QCOM',n:'Qualcomm Inc.'},
  {s:'CRM',n:'Salesforce Inc.'},  {s:'ADBE',n:'Adobe Inc.'},
  {s:'ORCL',n:'Oracle Corp.'},    {s:'IBM',n:'IBM Corp.'},
  {s:'NOW',n:'ServiceNow Inc.'}, {s:'UBER',n:'Uber Technologies'},
  {s:'LYFT',n:'Lyft Inc.'},       {s:'SQ',n:'Block Inc.'},
  {s:'PYPL',n:'PayPal Holdings'}, {s:'SHOP',n:'Shopify Inc.'},
  {s:'ROKU',n:'Roku Inc.'},       {s:'SNAP',n:'Snap Inc.'},
  {s:'TWLO',n:'Twilio Inc.'},     {s:'ZM',n:'Zoom Video'},
  {s:'PLTR',n:'Palantir Technologies'},{s:'RIVN',n:'Rivian Automotive'},
  {s:'LCID',n:'Lucid Group'},     {s:'NIO',n:'NIO Inc.'},
  {s:'BABA',n:'Alibaba Group'},   {s:'JD',n:'JD.com Inc.'},
  {s:'TSM',n:'Taiwan Semiconductor'},{s:'ASML',n:'ASML Holding'},
  {s:'SPY',n:'S&P 500 ETF'},      {s:'QQQ',n:'Nasdaq 100 ETF'},
  {s:'IWM',n:'Russell 2000 ETF'}, {s:'GLD',n:'Gold ETF'},
  {s:'SLV',n:'Silver ETF'},       {s:'TLT',n:'20yr Treasury ETF'},
  {s:'VTI',n:'Vanguard Total Market'},{s:'VOO',n:'Vanguard S&P 500'},
  {s:'ARKK',n:'ARK Innovation ETF'},{s:'F',n:'Ford Motor Co.'},
  {s:'GM',n:'General Motors'},    {s:'GE',n:'GE Aerospace'},
  {s:'BA',n:'Boeing Co.'},        {s:'CAT',n:'Caterpillar Inc.'},
  {s:'DE',n:'Deere & Co.'},       {s:'MMM',n:'3M Co.'},
  {s:'HON',n:'Honeywell Intl.'},  {s:'RTX',n:'RTX Corp.'},
  {s:'LMT',n:'Lockheed Martin'},  {s:'NOC',n:'Northrop Grumman'},
  {s:'GS',n:'Goldman Sachs'},     {s:'MS',n:'Morgan Stanley'},
  {s:'WFC',n:'Wells Fargo'},      {s:'C',n:'Citigroup Inc.'},
  {s:'AXP',n:'American Express'}, {s:'BLK',n:'BlackRock Inc.'},
  {s:'SCHW',n:'Charles Schwab'},  {s:'COIN',n:'Coinbase Global'},
  {s:'MSTR',n:'MicroStrategy'},   {s:'IBIT',n:'iShares Bitcoin ETF'},
  {s:'AMC',n:'AMC Entertainment'},{s:'GME',n:'GameStop Corp.'},
];

// ── HISTORY STORAGE ──────────────────────────────────────────────────────────
const HISTORY_KEY = 'equityradar_history_v1';
const MAX_HISTORY = 50;

function loadHistory() {
  try { return JSON.parse(localStorage.getItem(HISTORY_KEY)) || []; }
  catch { return []; }
}
function saveHistory(h) {
  try { localStorage.setItem(HISTORY_KEY, JSON.stringify(h)); } catch {}
}
function addToHistory(entry) {
  let h = loadHistory();
  // Remove duplicate ticker if already exists
  h = h.filter(x => x.ticker !== entry.ticker);
  h.unshift(entry);
  if (h.length > MAX_HISTORY) h = h.slice(0, MAX_HISTORY);
  saveHistory(h);
  renderHistory();
}
function renderHistory() {
  const h = loadHistory();
  const section = document.getElementById('history-section');
  const empty = document.getElementById('history-empty');
  const table = document.getElementById('history-table');
  const tbody = document.getElementById('history-rows');

  section.style.display = h.length ? '' : 'none';
  if (!h.length) { empty.style.display=''; table.style.display='none'; return; }
  empty.style.display = 'none';
  table.style.display = '';

  tbody.innerHTML = h.map(e => {
    const signalClass = e.signal.toLowerCase();
    const dt = new Date(e.ts);
    const dateStr = dt.toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
    const timeStr = dt.toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit', hour12:true});
    return `<tr onclick="reLookup('${e.ticker}')">
      <td><span class="h-ticker">${e.ticker}</span></td>
      <td><span class="h-name">${e.name}</span></td>
      <td class="h-signal"><span class="sb ${signalClass}">${e.signal}</span></td>
      <td class="h-price">$${e.price}</td>
      <td class="h-date">${dateStr} · ${timeStr}</td>
    </tr>`;
  }).join('');
}
function reLookup(ticker) {
  document.getElementById('ticker-input').value = ticker;
  analyze(ticker);
}

document.getElementById('clear-history-btn').addEventListener('click', () => {
  if (confirm('Clear all search history?')) {
    saveHistory([]);
    renderHistory();
  }
});

// ── AUTOCOMPLETE ─────────────────────────────────────────────────────────────
const input = document.getElementById('ticker-input');
const acList = document.getElementById('autocomplete-list');
let selectedAC = -1;

input.addEventListener('input', () => {
  const q = input.value.trim().toUpperCase();
  selectedAC = -1;
  if (!q || q.length < 1) { acList.style.display='none'; return; }
  const matches = SYMBOLS.filter(x => x.s.startsWith(q) || x.n.toUpperCase().includes(q)).slice(0,7);
  if (!matches.length) { acList.style.display='none'; return; }
  acList.innerHTML = matches.map((m,i) =>
    `<div class="autocomplete-item" data-ticker="${m.s}" data-idx="${i}">
      <span class="ac-ticker">${m.s}</span><span class="ac-name">${m.n}</span>
    </div>`).join('');
  acList.style.display = '';
  acList.querySelectorAll('.autocomplete-item').forEach(el => {
    el.addEventListener('mousedown', e => {
      e.preventDefault();
      input.value = el.dataset.ticker;
      acList.style.display='none';
      analyze(el.dataset.ticker);
    });
  });
});

input.addEventListener('keydown', e => {
  const items = acList.querySelectorAll('.autocomplete-item');
  if (e.key==='ArrowDown') { selectedAC=Math.min(selectedAC+1, items.length-1); highlight(items); e.preventDefault(); }
  else if (e.key==='ArrowUp') { selectedAC=Math.max(selectedAC-1, 0); highlight(items); e.preventDefault(); }
  else if (e.key==='Enter') {
    if (selectedAC>=0 && items[selectedAC]) { input.value=items[selectedAC].dataset.ticker; acList.style.display='none'; analyze(input.value); }
    else { acList.style.display='none'; analyze(input.value.trim().toUpperCase()); }
  }
  else if (e.key==='Escape') { acList.style.display='none'; }
});
document.addEventListener('click', e => { if (!e.target.closest('.ticker-wrap')) acList.style.display='none'; });
function highlight(items) { items.forEach((el,i) => el.style.background = i===selectedAC?'#131a23':''); }

document.getElementById('analyze-btn').addEventListener('click', () => {
  const t = input.value.trim().toUpperCase();
  if (t) { acList.style.display='none'; analyze(t); }
});

// ── ANALYZE ──────────────────────────────────────────────────────────────────
async function analyze(ticker) {
  if (!ticker) return;
  document.getElementById('result').style.display='none';
  document.getElementById('error-msg').style.display='none';
  document.getElementById('loading').style.display='';
  document.getElementById('analyze-btn').disabled = true;

  try {
    const res = await fetch('/api/analyze', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ticker})
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Analysis failed');
    renderResult(data);
    // Save to history
    addToHistory({
      ticker: data.ticker,
      name: data.name,
      signal: data.signal,
      price: data.price,
      ts: Date.now()
    });
  } catch(err) {
    const em = document.getElementById('error-msg');
    em.textContent = '⚠ ' + (err.message || 'Could not fetch data. Check the ticker and try again.');
    em.style.display='';
  } finally {
    document.getElementById('loading').style.display='none';
    document.getElementById('analyze-btn').disabled=false;
  }
}

function renderResult(d) {
  document.getElementById('r-name').textContent = d.name || '';
  document.getElementById('r-ticker').textContent = '$' + d.ticker;

  const priceEl = document.getElementById('r-price');
  priceEl.textContent = d.price ? '$' + Number(d.price).toFixed(2) : '—';

  const changeEl = document.getElementById('r-change');
  if (d.change !== undefined && d.changePct !== undefined) {
    const sign = d.change >= 0 ? '+' : '';
    changeEl.textContent = `${sign}${Number(d.change).toFixed(2)} (${sign}${Number(d.changePct).toFixed(2)}%)`;
    changeEl.className = 'change ' + (d.change >= 0 ? 'pos' : 'neg');
  } else { changeEl.textContent = ''; }

  const sig = (d.signal||'HOLD').toLowerCase();
  document.getElementById('r-signal').innerHTML =
    `<span class="signal-badge ${sig}"><span class="signal-dot"></span>${d.signal||'HOLD'}</span>`;

  // Metrics
  const metrics = [
    {label:'Open', val: d.open ? '$'+Number(d.open).toFixed(2) : '—'},
    {label:'52W High', val: d.high52 ? '$'+Number(d.high52).toFixed(2) : '—'},
    {label:'52W Low', val: d.low52 ? '$'+Number(d.low52).toFixed(2) : '—'},
    {label:'Volume', val: d.volume ? fmtNum(d.volume) : '—'},
    {label:'Mkt Cap', val: d.marketCap ? fmtCap(d.marketCap) : '—'},
    {label:'P/E Ratio', val: d.pe ? Number(d.pe).toFixed(1) : '—'},
  ];
  document.getElementById('r-metrics').innerHTML = metrics.map(m =>
    `<div class="metric"><div class="metric-label">${m.label}</div><div class="metric-value">${m.val}</div></div>`
  ).join('');

  // Analysis
  const analysisEl = document.getElementById('r-analysis');
  if (d.analysis) {
    analysisEl.innerHTML = d.analysis.split('\n').filter(Boolean).map(p=>`<p>${p}</p>`).join('');
    analysisEl.style.display='';
  } else { analysisEl.style.display='none'; }

  document.getElementById('result').style.display='';
}

function fmtNum(n) {
  if (n>=1e9) return (n/1e9).toFixed(1)+'B';
  if (n>=1e6) return (n/1e6).toFixed(1)+'M';
  if (n>=1e3) return (n/1e3).toFixed(0)+'K';
  return n;
}
function fmtCap(n) {
  if (n>=1e12) return '$'+(n/1e12).toFixed(2)+'T';
  if (n>=1e9) return '$'+(n/1e9).toFixed(1)+'B';
  if (n>=1e6) return '$'+(n/1e6).toFixed(0)+'M';
  return '$'+n;
}
