*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {

  --buy: #00c853; --hold: #f59e0b; --sell: #ef4444;
  --mono: 'DM Mono', monospace; --sans: 'Inter', sans-serif; --display: 'Bebas Neue', sans-serif;
}
body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; padding: 2rem 1rem; }
.wrap { max-width: 720px; margin: 0 auto; }
header { text-align: center; margin-bottom: 2.5rem; }
header .eyebrow { font-family: var(--mono); font-size: 0.65rem; letter-spacing: 0.3em; color: var(--muted); text-transform: uppercase; margin-bottom: 0.5rem; }
header h1 { font-family: var(--display); font-size: clamp(2.5rem, 8vw, 4rem); letter-spacing: 0.08em; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1; }
header .sub { font-size: 0.75rem; font-family: var(--mono); color: var(--muted); margin-top: 0.4rem; letter-spacing: 0.1em; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.25rem; }
.search-row { display: flex; gap: 0.75rem; position: relative; }
.ticker-wrap { position: relative; flex: 1; }
.ticker-prefix { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); font-family: var(--mono); font-weight: 500; color: var(--accent); font-size: 1rem; z-index: 1; }
#ticker-input { width: 100%; background: #060a0e; border: 1px solid var(--border); border-radius: 8px; padding: 0.85rem 1rem 0.85rem 2rem; color: var(--accent); font-family: var(--mono); font-size: 1.1rem; font-weight: 500; letter-spacing: 0.1em; outline: none; transition: border-color 0.2s; }
#ticker-input:focus { border-color: var(--accent); }
#ticker-input::placeholder { color: #2a3540; letter-spacing: 0.05em; font-size: 0.9rem; }
#analyze-btn { background: var(--accent); border: none; border-radius: 8px; padding: 0.85rem 1.5rem; color: #040806; font-family: var(--mono); font-size: 0.85rem; font-weight: 500; letter-spacing: 0.1em; cursor: pointer; white-space: nowrap; transition: background 0.15s; }
#analyze-btn:hover { background: #00e57a; }
#analyze-btn:disabled { opacity: 0.5; cursor: not-allowed; }
#autocomplete { position: absolute; top: calc(100% + 4px); left: 0; right: 0; background: #0d1117; border: 1px solid var(--accent); border-radius: 8px; z-index: 100; max-height: 280px; overflow-y: auto; display: none; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
.ac-item { padding: 0.65rem 1rem; cursor: pointer; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); transition: background 0.1s; }
.ac-item:last-child { border-bottom: none; }
.ac-item:hover, .ac-item.active { background: #00ff8815; }
.ac-ticker { font-family: var(--mono); font-size: 0.85rem; font-weight: 500; color: var(--accent); min-width: 60px; }
.ac-name { font-size: 0.8rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ac-sector { font-size: 0.7rem; color: #334155; margin-left: auto; white-space: nowrap; padding-left: 8px; }
.quick-row { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 1rem; align-items: center; }
.quick-label { font-family: var(--mono); font-size: 0.65rem; color: var(--muted); letter-spacing: 0.1em; }
.quick-btn { background: transparent; border: 1px solid var(--border); border-radius: 5px; padding: 0.25rem 0.6rem; color: var(--muted); font-family: var(--mono); font-size: 0.7rem; font-weight: 500; cursor: pointer; transition: all 0.15s; }
.quick-btn:hover { background: #00ff8820; border-color: #00ff8860; color: var(--accent); }
#status-box { display: none; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1rem 1.25rem; margin-bottom: 1.25rem; }
.status-inner { display: flex; align-items: center; gap: 0.75rem; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); animation: pulse 1s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
#status-msg { font-family: var(--mono); font-size: 0.75rem; color: var(--accent); letter-spacing: 0.08em; }
.result-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; animation: slideUp 0.3s ease; }
@keyframes slideUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
.result-header { padding: 1.25rem 1.5rem; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border); }
.ticker-label { font-family: var(--display); font-size: 1.8rem; letter-spacing: 0.05em; color: var(--text); }
.company-name { font-size: 0.8rem; color: var(--muted); margin-top: 2px; }
.rec-badge { padding: 4px 14px; border-radius: 20px; font-family: var(--mono); font-size: 0.75rem; font-weight: 500; letter-spacing: 1px; }
.rec-BUY { background: #00c85320; color: var(--buy); border: 1px solid #00c85340; }
.rec-HOLD { background: #f59e0b20; color: var(--hold); border: 1px solid #f59e0b40; }
.rec-SELL { background: #ef444420; color: var(--sell); border: 1px solid #ef444440; }
.price-group { margin-left: auto; text-align: right; }
.price-main { font-size: 1.5rem; font-weight: 500; font-family: var(--mono); }
.price-chg { font-size: 0.8rem; font-family: var(--mono); font-weight: 500; }
.up { color: var(--buy); } .dn { color: var(--sell); }
.metrics-bar { display: flex; flex-wrap: wrap; border-bottom: 1px solid var(--border); }
.metric-item { flex: 1; min-width: 100px; padding: 0.75rem 1.25rem; border-right: 1px solid var(--border); }
.metric-item:last-child { border-right: none; }
.metric-label { font-family: var(--mono); font-size: 0.6rem; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 3px; }
.metric-val { font-family: var(--mono); font-size: 0.9rem; font-weight: 500; color: var(--text); }
.result-body { padding: 1.25rem 1.5rem; }
.catalyst-box { background: #f59e0b10; border-left: 3px solid var(--hold); border-radius: 0 8px 8px 0; padding: 0.75rem 1rem; font-size: 0.8rem; color: #fbbf24; line-height: 1.5; margin-bottom: 1rem; }
.catalyst-label { font-family: var(--mono); font-size: 0.65rem; letter-spacing: 0.1em; color: var(--hold); margin-bottom: 4px; }
.bull-bear { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 1rem; }
.bull-box { background: #00c85310; border-radius: 8px; padding: 0.85rem 1rem; }
.bear-box { background: #ef444410; border-radius: 8px; padding: 0.85rem 1rem; }
.bb-label { font-family: var(--mono); font-size: 0.65rem; letter-spacing: 0.08em; margin-bottom: 5px; }
.bull-box .bb-label { color: var(--buy); } .bear-box .bb-label { color: var(--sell); }
.bb-text { font-size: 0.8rem; line-height: 1.5; color: #c8d0dc; }
.entry-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; margin-bottom: 1rem; }
.entry-item { background: #0a0f14; border: 1px solid var(--border); border-radius: 8px; padding: 0.75rem 1rem; }
.entry-label { font-family: var(--mono); font-size: 0.6rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 4px; }
.entry-val { font-family: var(--mono); font-size: 0.85rem; font-weight: 500; color: var(--text); }
.summary-box { border-left: 3px solid var(--border2); padding: 0.75rem 1rem; font-size: 0.82rem; color: var(--muted); line-height: 1.7; }
footer { text-align: center; margin-top: 2rem; font-family: var(--mono); font-size: 0.6rem; color: #1e2630; letter-spacing: 0.08em; }
</style>

  ['XPEV','XPeng','China EV'],['BYD','BYD','China EV'],
  ['SE','Sea Limited','SE Asia Tech'],['GRAB','Grab Holdings','SE Asia Tech'],
  ['MELI','MercadoLibre','Latin America'],['NU','Nu Holdings (Nubank)','Latin America'],
  ['VIST','Vista Energy','Latin America'],
  ['SAP','SAP SE','Germany Tech'],['ASML','ASML Holding','Netherlands Tech'],
  ['SHOP','Shopify','Canada Tech'],['RY','Royal Bank of Canada','Canada Finance'],
  ['TD','Toronto-Dominion Bank','Canada Finance'],
  // AI / Emerging
  ['BBAI','BigBear.ai','AI'],['RGTI','Rigetti Computing','Quantum'],
  ['QBTS','D-Wave Quantum','Quantum'],['IONQ','IonQ','Quantum'],
  ['IREN','Iris Energy','AI/Mining'],['SOUN','SoundHound AI','AI'],
  ['AI','C3.ai','AI'],['BIGB','BigBear','AI'],
  ['PATH','UiPath','AI/Automation'],['ASAN','Asana','Tech'],
  ['MNDY','Monday.com','Tech'],['SMAR','Smartsheet','Tech'],
  ['ZI','ZoomInfo','Tech'],['BRZE','Braze','Tech'],
  ['PCVX','Vaxcyte','Biotech'],['ACLS','Axcelis Technologies','Tech'],
  ['FORM','FormFactor','Tech'],['ONTO','Onto Innovation','Tech'],
];

var filtered = [];
var activeIdx = -1;

function showAutocomplete(query) {
  const ac = document.getElementById('autocomplete');
  const q = query.toUpperCase().trim();
  if (!q) { ac.style.display = 'none'; return; }

  // Match ticker start, then company name contains
  filtered = STOCKS.filter(s =>
    s[0].startsWith(q) || s[1].toUpperCase().includes(q)
  );
  // Sort: exact ticker matches first
  filtered.sort((a, b) => {
    const aExact = a[0] === q ? 0 : a[0].startsWith(q) ? 1 : 2;
    const bExact = b[0] === q ? 0 : b[0].startsWith(q) ? 1 : 2;
    return aExact - bExact;
  });
  filtered = filtered.slice(0, 8);

  if (!filtered.length) { ac.style.display = 'none'; return; }

  ac.innerHTML = filtered.map((s, i) =>
    `<div class="ac-item" data-idx="${i}" onmousedown="selectStock(${i})">
      <span class="ac-ticker">${s[0]}</span>
      <span class="ac-name">${s[1]}</span>
      <span class="ac-sector">${s[2]}</span>
    </div>`
  ).join('');
  ac.style.display = 'block';
  activeIdx = -1;
}

function selectStock(idx) {
  const s = filtered[idx];
  document.getElementById('ticker-input').value = s[0];
  document.getElementById('autocomplete').style.display = 'none';
  runAnalysis();
}

const input = document.getElementById('ticker-input');
input.addEventListener('input', e => showAutocomplete(e.target.value));
input.addEventListener('blur', () => setTimeout(() => { document.getElementById('autocomplete').style.display = 'none'; }, 150));
input.addEventListener('keydown', e => {
  const ac = document.getElementById('autocomplete');
  const items = ac.querySelectorAll('.ac-item');
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    activeIdx = Math.min(activeIdx + 1, items.length - 1);
    items.forEach((el, i) => el.classList.toggle('active', i === activeIdx));
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    activeIdx = Math.max(activeIdx - 1, -1);
    items.forEach((el, i) => el.classList.toggle('active', i === activeIdx));
  } else if (e.key === 'Enter') {
    if (activeIdx >= 0 && filtered[activeIdx]) { selectStock(activeIdx); }
    else { ac.style.display = 'none'; runAnalysis(); }
  } else if (e.key === 'Escape') {
    ac.style.display = 'none';
  }
});

function quick(t) {
  document.getElementById('ticker-input').value = t;
  document.getElementById('autocomplete').style.display = 'none';
  runAnalysis();
}

function setStatus(msg) {
  document.getElementById('status-box').style.display = msg ? 'block' : 'none';
  document.getElementById('status-msg').textContent = msg;
}

function fld(text, name) {
  const m = text.match(new RegExp('^' + name + '\\s*:\\s*(.+)$', 'im'));
  return m ? m[1].trim().replace(/\*\*/g, '') : '—';
}

function recLabel(text) {
  const m = text.match(/^RECOMMENDATION\s*:\s*(BUY|HOLD|SELL)/im);
  return m ? m[1].toUpperCase() : 'HOLD';
}

async function runAnalysis() {
  const ticker = (document.getElementById('ticker-input').value || '').trim().toUpperCase();
  if (!ticker) return;
  const btn = document.getElementById('analyze-btn');
  btn.disabled = true; btn.textContent = 'ANALYZING...';
  document.getElementById('result-box').style.display = 'none';
  document.getElementById('autocomplete').style.display = 'none';
  setStatus('Analyzing ' + ticker + '...');

  try {
    const res = await fetch('/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ticker })
    });
    const data = await res.json();
    if (data.error) { setStatus('Error: ' + data.error); btn.disabled = false; btn.textContent = 'ANALYZE ›'; return; }

    setStatus('');
    btn.disabled = false; btn.textContent = 'ANALYZE ›';

    const { price, chg, high, low, vwap, volume, prevClose, analysis } = data;
    const rec = recLabel(analysis);
    const pctStr = (chg >= 0 ? '+' : '') + chg.toFixed(2) + '%';
    const catalyst = fld(analysis, 'Catalyst');
    const stockInfo = STOCKS.find(s => s[0] === ticker);
    const companyName = stockInfo ? stockInfo[1] : '';

    document.getElementById('result-box').style.display = 'block';
    document.getElementById('result-box').innerHTML = `
      <div class="result-card">
        <div class="result-header">
          <div>
            <span class="ticker-label">${ticker}</span>
            ${companyName ? `<div class="company-name">${companyName}</div>` : ''}
          </div>
          <span class="rec-badge rec-${rec}">${rec}</span>
          <div class="price-group">
            <div class="price-main">$${price.toFixed(2)}</div>
            <div class="price-chg ${chg >= 0 ? 'up' : 'dn'}">${pctStr} today</div>
          </div>
        </div>
        <div class="metrics-bar">
          <div class="metric-item"><div class="metric-label">High</div><div class="metric-val">$${high.toFixed(2)}</div></div>
          <div class="metric-item"><div class="metric-label">Low</div><div class="metric-val">$${low.toFixed(2)}</div></div>
          <div class="metric-item"><div class="metric-label">VWAP</div><div class="metric-val">$${vwap.toFixed(2)}</div></div>
          <div class="metric-item"><div class="metric-label">Volume</div><div class="metric-val">${(volume/1e6).toFixed(1)}M</div></div>
          <div class="metric-item"><div class="metric-label">Prev Close</div><div class="metric-val">$${prevClose.toFixed(2)}</div></div>
        </div>
        <div class="result-body">
          ${catalyst !== '—' && catalyst !== 'No clear catalyst' ? `<div class="catalyst-box"><div class="catalyst-label">⚡ CATALYST</div>${catalyst}</div>` : ''}
          <div class="bull-bear">
            <div class="bull-box"><div class="bb-label">▲ BULL CASE</div><div class="bb-text">${fld(analysis,'Bull')}</div></div>
            <div class="bear-box"><div class="bb-label">▼ BEAR CASE</div><div class="bb-text">${fld(analysis,'Bear')}</div></div>
          </div>
          <div class="entry-row">
            <div class="entry-item"><div class="entry-label">Confidence</div><div class="entry-val">${fld(analysis,'Confidence')}</div></div>
            <div class="entry-item"><div class="entry-label">12M Target</div><div class="entry-val">${fld(analysis,'Target')}</div></div>
            <div class="entry-item"><div class="entry-label">Entry</div><div class="entry-val" style="font-size:0.75rem;">${fld(analysis,'Entry')}</div></div>
          </div>
          <div class="summary-box">${fld(analysis,'Summary')}</div>
        </div>
      </div>`;
  } catch(e) {
    setStatus('Error: ' + e.message);
    btn.disabled = false; btn.textContent = 'ANALYZE ›';
  }
}
</script>
</body>
</html>
